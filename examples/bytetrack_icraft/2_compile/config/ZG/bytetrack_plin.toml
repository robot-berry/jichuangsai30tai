[parse]
net_name = "bytetrack"
framework = "pytorch"
inputs = [ 1, 512, 960, 3]
inputs_layout = "NHWC"
inputs_dtype = "UINT8"
pre_method = "resize"
pre_scale = [58.395, 57.12, 57.375]
pre_mean = [ 123.675, 116.28, 103.53]
channel_swap = [0,1,2]
network = "fmodel/bytetrack_s_512x960_traced.pt"
jr_path = "../3_deploy/imodel/ZG/plin/"
frame_version = "1.9"
target = "zhuge"

[optimize]
target = "zhuge"
json = "../3_deploy/imodel/ZG/plin/bytetrack_parsed.json"
raw = "../3_deploy/imodel/ZG/plin/bytetrack_parsed.raw"
jr_path = "../3_deploy/imodel/ZG/plin/"

[quantize]
forward_mode = "image"
saturation = "kld"
forward_dir = "./qtset/mot17-08"
forward_list = "./qtset/mot17-08.txt"
qdtype = "int8"
json = "../3_deploy/imodel/ZG/plin/bytetrack_optimized.json"
raw = "../3_deploy/imodel/ZG/plin/bytetrack_optimized.raw"
jr_path = "../3_deploy/imodel/ZG/plin/"
per = "tensor"
target = "zhuge"

[adapt]
target = "zhuge"
json = "../3_deploy/imodel/ZG/plin/bytetrack_quantized.json"
raw = "../3_deploy/imodel/ZG/plin/bytetrack_quantized.raw"
jr_path = "../3_deploy/imodel/ZG/plin/"
pass_on = "customop.DetPostZGPass"
custom_config = "config/customop/bytetrack.toml"

[generate]
json = "../3_deploy/imodel/ZG/plin/bytetrack_adapted.json"
raw = "../3_deploy/imodel/ZG/plin/bytetrack_adapted.raw"
jr_path = "../3_deploy/imodel/ZG/plin/"
log_path = "./logs/"

[run]
log_time = true
log_io = true
dump_format = "SFB"
json = "../3_deploy/imodel/ZG/plin/bytetrack_ZG.json"
raw = "../3_deploy/imodel/ZG/plin/bytetrack_ZG.raw"
input = "./qtset/mot17-08/000001.jpg"
log_path = "./logs/"
